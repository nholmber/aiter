name: Aiter Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]  # Triggers on PRs targeting `main`
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # 6:00 AM Beijing Time (UTC+8)

concurrency:
  # Keep scheduled main runs from blocking push-triggered validation.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOCKER_IMAGE: "rocm/pytorch:latest"
  GPU_ARCH_LIST: "gfx942;gfx950"
  AITER_TEST: "op_tests"
  AITER_WHEEL_ARTIFACT_NAME: aiter-whl-${{ github.run_id }}

jobs:
  check-signal:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and check signal artifact
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  build_aiter_wheels:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    runs-on: build-only-aiter
    needs: check-signal
    permissions:
      id-token: write
      contents: read
    steps:
      # ---- Common steps (fork and non-fork) ----
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Sync submodules for wheel build
        run: |
          set -ex
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly build: syncing latest CK from develop branch..."
            git submodule set-branch --branch develop 3rdparty/composable_kernel
            git submodule sync
            git submodule update --init --recursive --remote --jobs 4
          else
            echo "Using pinned CK commit..."
            git submodule sync
            git submodule update --init --recursive --depth 1 --jobs 4
          fi
          echo "CK commit: $(git -C 3rdparty/composable_kernel rev-parse HEAD)"

      - name: Docker login
        if: ${{ !github.event.pull_request || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Build Aiter wheel in base container
        run: |
          set -euo pipefail
          docker run --rm \
            --network=host \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -lc '
              git config --global --add safe.directory /workspace &&
              git -C /workspace rev-parse HEAD >/dev/null &&
              shopt -s nullglob &&
              rm -rf dist build aiter_meta ./*.egg-info &&
              pip install -r requirements.txt &&
              pip install --upgrade pandas zmq einops numpy==1.26.2 &&
              pip install --upgrade "pybind11>=3.0.1" &&
              pip install --upgrade "ninja>=1.11.1" &&
              pip install --upgrade setuptools_scm &&
              pip install tabulate &&
              echo "Prebuilding kernels with GPU_ARCHS: ${{ env.GPU_ARCH_LIST }}, PREBUILD_KERNELS: 1, and MAX_JOBS: 128" &&
              PREBUILD_KERNELS=1 MAX_JOBS=128 GPU_ARCHS="${{ env.GPU_ARCH_LIST }}" python setup.py bdist_wheel &&
              ls -lh dist/*.whl
            '

      - name: Verify prebuilt kernels in wheel
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import zipfile

          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel in dist/, found {len(wheels)}")

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as zf:
              kernels = sorted(
                  name for name in zf.namelist()
                  if name.startswith("aiter/jit/") and name.endswith(".so")
              )

          print("=== Prebuilt kernel validation ===")
          print(f"Wheel: {wheel}")
          print(f"Prebuilt kernel .so files: {len(kernels)}")
          for kernel in kernels:
              print(kernel)

          if len(kernels) < 10:
              print(
                  f"::warning::Prebuild may have failed: expected at least 10 kernel .so files, found {len(kernels)}. "
                  "This can cause JIT compilation and OOM at runtime."
              )
          else:
              print(f"Prebuild validation passed: {len(kernels)} kernels compiled")
          PY

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AITER_WHEEL_ARTIFACT_NAME }}
          path: dist/*.whl
          retention-days: 14

      - name: Configure AWS credentials
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'schedule' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::661452401056:role/framework-aiter-nightlies

      - name: Install AWS CLI
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'schedule' }}
        run: |
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            rm -rf awscliv2.zip aws
          fi

      - name: Upload wheels and latest main manifest to S3
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'schedule' }}
        run: |
          for WHL in dist/*.whl; do
            WHL_NAME=$(basename ${WHL})
            echo "Uploading ${WHL_NAME} to S3..."
            aws s3 cp ${WHL} s3://framework-whls-nightlies/whl-staging/gfx942-gfx950/${WHL_NAME}
          done
          echo "Wheels uploaded to S3 staging"

          MANIFEST_WHL=$(ls -t dist/amd_aiter*.whl 2>/dev/null | head -1)
          if [ -z "$MANIFEST_WHL" ]; then
            echo "ERROR: No amd_aiter wheel found in dist/"
            exit 1
          fi

          MANIFEST_WHL_NAME=$(basename "$MANIFEST_WHL")
          MANIFEST_WHL_URL="https://rocm.frameworks-nightlies.amd.com/whl-staging/gfx942-gfx950/${MANIFEST_WHL_NAME}"
          MANIFEST_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 -c "import json, pathlib, sys; pathlib.Path('latest-main-wheel.json').write_text(json.dumps({'branch': sys.argv[1], 'timestamp': sys.argv[2], 'commit': sys.argv[3], 'wheel_name': sys.argv[4], 'wheel_url': sys.argv[5]}, indent=2) + '\n', encoding='utf-8')" \
            "$GITHUB_REF_NAME" "$MANIFEST_TIMESTAMP" "$GITHUB_SHA" "$MANIFEST_WHL_NAME" "$MANIFEST_WHL_URL"

          aws s3 cp latest-main-wheel.json \
            s3://framework-whls-nightlies/whl-staging/gfx942-gfx950/main/latest.json \
            --content-type application/json

          echo "Uploaded latest main wheel manifest for ${MANIFEST_WHL_NAME}"

  split_aiter_tests:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    needs: [check-signal, build_aiter_wheels]
    outputs:
      shard_count: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Split Aiter Tests (5 shards)
        run: ./.github/scripts/split_tests.sh --shards 5 --test-type aiter

      - name: Upload test shard lists as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiter_shards
          path: aiter_shard_*.list
          retention-days: 7

  standard:
    if: >-
      (!github.event.pull_request || github.event.pull_request.draft == false) &&
      github.event.action != 'labeled'
    name: Standard Tests (1 GPU)
    needs: [build_aiter_wheels, split_aiter_tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: linux-aiter-mi35x-1
            label: MI35X
            shard_total: 5
            shard_idx: 0
          - runner: linux-aiter-mi35x-1
            label: MI35X
            shard_total: 5
            shard_idx: 1
          - runner: linux-aiter-mi35x-1
            label: MI35X
            shard_total: 5
            shard_idx: 2
          - runner: linux-aiter-mi35x-1
            label: MI35X
            shard_total: 5
            shard_idx: 3
          - runner: linux-aiter-mi35x-1
            label: MI35X
            shard_total: 5
            shard_idx: 4
          - runner: linux-aiter-mi300x-1
            label: MI300X
            shard_total: 5
            shard_idx: 0
          - runner: linux-aiter-mi300x-1
            label: MI300X
            shard_total: 5
            shard_idx: 1
          - runner: linux-aiter-mi300x-1
            label: MI300X
            shard_total: 5
            shard_idx: 2
          - runner: linux-aiter-mi300x-1
            label: MI300X
            shard_total: 5
            shard_idx: 3
          - runner: linux-aiter-mi300x-1
            label: MI300X
            shard_total: 5
            shard_idx: 4
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download test shard lists
        uses: actions/download-artifact@v4
        with:
          name: aiter_shards

      - name: List test shard files
        run: |
          ls -l aiter_shard_*.list

      - name: Export test file list for this shard as env
        id: set_shard_files
        run: |
          echo "AITER_TEST=$(cat aiter_shard_${{ matrix.shard_idx }}.list)" >> $GITHUB_ENV
          echo "$AITER_TEST"

      - name: Download Aiter wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.AITER_WHEEL_ARTIFACT_NAME }}
          path: aiter_wheels

      - name: Docker login
        if: ${{ !github.event.pull_request || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Run the container
        run: |
          set -ex
          echo "Starting container: aiter_test"

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          IMAGE_TAG=${{ env.DOCKER_IMAGE }}

          docker run -dt \
          --device=/dev/kfd $DEVICE_FLAG \
          --shm-size=16G \
          --network=host \
          --group-add $(getent group render | cut -d: -f3) \
          --group-add $(getent group video | cut -d: -f3) \
          -e AITER_TEST="${AITER_TEST}" \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          --name aiter_test \
          $IMAGE_TAG

      - name: Sync CK submodule
        run: |
          set -ex
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly build: syncing latest CK from develop branch..."
            git submodule set-branch --branch develop 3rdparty/composable_kernel
            git submodule sync
            git submodule update --init --recursive --remote --jobs 4
          else
            echo "Using pinned CK commit..."
            git submodule sync
            git submodule update --init --recursive --depth 1 --jobs 4
          fi

      - name: Install Aiter wheel
        run: |
          set -euo pipefail
          ls -lh aiter_wheels
          shopt -s nullglob
          wheels=(aiter_wheels/*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one Aiter wheel artifact, found ${#wheels[@]}"
            exit 1
          fi
          AITER_WHEEL_PATH="/workspace/${wheels[0]}"
          echo "Installing Aiter wheel: ${AITER_WHEEL_PATH}"
          docker exec \
          -w /workspace \
          aiter_test \
          bash -lc "
            pip uninstall -y amd-aiter aiter || true
            pip install -r requirements.txt
            pip install --upgrade pandas zmq einops numpy==1.26.2
            pip install --upgrade 'pybind11>=3.0.1'
            pip install --upgrade 'ninja>=1.11.1'
            pip install tabulate
            pip install '${AITER_WHEEL_PATH}'
            pip show amd-aiter
          "

      - name: Install amd-triton
        run: |
          # Ensure install_triton.sh is available even when the PR branch
          # was created before the script was added to main (#2959).
          # The workflow file always comes from the base branch, so we
          # materialize the script from the base ref when missing.
          if [ ! -f .github/scripts/install_triton.sh ]; then
            BASE_REF="${{ github.event.pull_request.base.ref || github.ref_name }}"
            mkdir -p .github/scripts
            curl -fsSL \
              "https://raw.githubusercontent.com/${{ github.repository }}/${BASE_REF}/.github/scripts/install_triton.sh" \
              -o .github/scripts/install_triton.sh
            chmod +x .github/scripts/install_triton.sh
          fi
          docker exec -w /workspace aiter_test \
            bash -c "./.github/scripts/install_triton.sh && pip show amd-triton"

      - name: Show Aiter version
        run: |
          set -ex
          docker exec \
          -w /workspace \
          aiter_test \
          bash -c "pip show amd-aiter || true"

      - name: Tests
        timeout-minutes: 90
        run: |
          set -ex
          docker exec \
          -w /workspace \
          aiter_test \
          bash -c "SHARD_TOTAL=${{ matrix.shard_total }} SHARD_IDX=${{ matrix.shard_idx }} ./.github/scripts/aiter_test.sh"

      - name: Collect test logs
        if: always()
        run: |
          echo "Collecting test logs..."
          echo "Aiter Operator Tests Summary:" >> $GITHUB_STEP_SUMMARY
          python3 ./.github/scripts/collect_logs.py latest_test.log >> $GITHUB_STEP_SUMMARY

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: standard-test-log-${{ matrix.runner }}-shard-${{ matrix.shard_idx }}
          path: latest_test.log
          retention-days: 7

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f aiter_test || true

  standard-test-finish:
    if: >-
      !github.event.pull_request.draft &&
      github.event.action != 'labeled'
    name: Standard Test Results
    runs-on: ubuntu-latest
    needs: [standard]
    steps:
      - name: Download all test logs
        uses: actions/download-artifact@v4
        with:
          pattern: standard-test-log-*-shard-*
          path: .

      - name: List test logs
        run: |
          ls -l standard-test-log-*

      - name: Check Standard Test Results
        run: |
          set -ex
          echo "Checking Standard Test Results..."
          all_passed=true
          for shard in {0..4}; do
            for runner in {linux-aiter-mi35x-1,linux-aiter-mi300x-1}; do
              if [ ! -f standard-test-log-${runner}-shard-${shard}/latest_test.log ]; then
                echo "Test report for ${runner} shard ${shard} not found."
                all_passed=false
                break
              fi
            done
          done
          if [ "$all_passed" = true ]; then
            echo "All tests passed."
          else
            echo "Test failures or errors detected."
            exit 1
          fi

  multi-gpu:
    name: Multi-GPU Tests (8 GPU)
    if: github.ref == 'refs/heads/main'
    needs: build_aiter_wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: linux-aiter-mi35x-8
            label: MI35X
          - runner: linux-aiter-mi300x-8
            label: MI300X
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download Aiter wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.AITER_WHEEL_ARTIFACT_NAME }}
          path: aiter_wheels

      - name: Docker login
        if: ${{ !github.event.pull_request || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Run the container
        run: |
          set -ex
          echo "Starting container: aiter_test"

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          IMAGE_TAG=${{ env.DOCKER_IMAGE }}

          docker run -dt \
          --device=/dev/kfd $DEVICE_FLAG \
          --shm-size=16G \
          --network=host \
          --group-add $(getent group render | cut -d: -f3) \
          --group-add $(getent group video | cut -d: -f3) \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          --name aiter_test \
          $IMAGE_TAG

      - name: Sync CK submodule
        run: |
          set -ex
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly build: syncing latest CK from develop branch..."
            git submodule set-branch --branch develop 3rdparty/composable_kernel
            git submodule sync
            git submodule update --init --recursive --remote --jobs 4
          else
            echo "Using pinned CK commit..."
            git submodule sync
            git submodule update --init --recursive --depth 1 --jobs 4
          fi

      - name: Install Aiter wheel
        run: |
          set -euo pipefail
          ls -lh aiter_wheels
          shopt -s nullglob
          wheels=(aiter_wheels/*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one Aiter wheel artifact, found ${#wheels[@]}"
            exit 1
          fi
          AITER_WHEEL_PATH="/workspace/${wheels[0]}"
          echo "Installing Aiter wheel: ${AITER_WHEEL_PATH}"
          docker exec \
          -w /workspace \
          aiter_test \
          bash -lc "
            pip uninstall -y amd-aiter aiter || true
            pip install -r requirements.txt
            pip install --upgrade pandas zmq einops numpy==1.26.2
            pip install --upgrade 'pybind11>=3.0.1'
            pip install --upgrade 'ninja>=1.11.1'
            pip install tabulate
            pip install '${AITER_WHEEL_PATH}'
            pip show amd-aiter
          "

      - name: Install amd-triton
        run: |
          # Ensure install_triton.sh is available even when the PR branch
          # was created before the script was added to main (#2959).
          # The workflow file always comes from the base branch, so we
          # materialize the script from the base ref when missing.
          if [ ! -f .github/scripts/install_triton.sh ]; then
            BASE_REF="${{ github.event.pull_request.base.ref || github.ref_name }}"
            mkdir -p .github/scripts
            curl -fsSL \
              "https://raw.githubusercontent.com/${{ github.repository }}/${BASE_REF}/.github/scripts/install_triton.sh" \
              -o .github/scripts/install_triton.sh
            chmod +x .github/scripts/install_triton.sh
          fi
          docker exec -w /workspace aiter_test \
            bash -c "./.github/scripts/install_triton.sh && pip show amd-triton"

      - name: Show Aiter version
        run: |
          set -ex
          docker exec \
          -w /workspace \
          aiter_test \
          bash -c "pip show amd-aiter || true"

      - name: Tests
        timeout-minutes: 60
        run: |
          set -ex
          docker exec \
          -e MULTIGPU=TRUE \
          -w /workspace \
          aiter_test \
          bash -c "./.github/scripts/aiter_test.sh"

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: multigpu-test-${{ matrix.runner }}
          path: latest_test.log
          retention-days: 7

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f aiter_test || true

      - name: Clean up Rocm processes
        if: always()
        run: |
          ./.github/scripts/clean_up_rocm.sh
